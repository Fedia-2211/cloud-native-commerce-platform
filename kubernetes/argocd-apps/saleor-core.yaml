apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saleor-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fedia-2211/cloud-native-commerce-platform.git
    targetRevision: main
    path: helm/saleor-core
  destination:
    server: https://kubernetes.default.svc
    namespace: saleor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
