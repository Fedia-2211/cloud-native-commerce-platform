replicaCount: 2

image:
  repository: ghcr.io/saleor/saleor
  tag: "3.20"
  pullPolicy: IfNotPresent

service:
  port: 8000

ingress:
  host: api.samadov.xyz

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

hpa:
  minReplicas: 2
  maxReplicas: 4
  cpuUtilization: 70