name: CI/CD Pipeline - Security + Build + Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'helm/**'
      - 'terraform/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 176899553634.dkr.ecr.us-east-1.amazonaws.com
  PROJECT_NAME: cloud-native-commerce-platform

jobs:
  # ─── Stage 1: Secret Scanning ─────────────────────────────────────────────
  secret-scan:
    name: "Security Gate 1 — Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Stage 2: Terraform Security ──────────────────────────────────────────
  terraform-scan:
    name: "Security Gate 2 — Checkov Terraform Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          output_format: cli
          download_external_modules: false

  # ─── Stage 3: Build + Container Scan + Push ───────────────────────────────
  build-scan-push:
    name: "Build + Trivy Scan + Push to ECR"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    permissions:
      contents: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/$PROJECT_NAME/saleor-storefront:${{ steps.meta.outputs.tag }} \
            -t $ECR_REGISTRY/$PROJECT_NAME/saleor-storefront:latest \
            ./apps/storefront/

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}/saleor-storefront:${{ steps.meta.outputs.tag }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$PROJECT_NAME/saleor-storefront:${{ steps.meta.outputs.tag }}
          docker push $ECR_REGISTRY/$PROJECT_NAME/saleor-storefront:latest

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag:.*|tag: \"${{ steps.meta.outputs.tag }}\"|" \
            helm/saleor-storefront/values.yaml
          cat helm/saleor-storefront/values.yaml | grep tag

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/saleor-storefront/values.yaml
          git stash
          git pull --rebase origin main
          git stash pop
          git add helm/saleor-storefront/values.yaml
          git commit -m "CI: update storefront image to ${{ steps.meta.outputs.tag }}" || echo "No changes"
          git push

  # ─── Stage 4: Verify Deployment ────────────────────────────────────────────
  verify:
    name: "Verify ArgoCD Deployment"
    runs-on: ubuntu-latest
    needs: [build-scan-push]
    steps:
      - name: Wait for ArgoCD to sync
        run: sleep 30

      - name: Verify storefront is live
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://shop.samadov.xyz/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Health check returned $STATUS"
          else
            echo "Deployment verified successfully"
          fi